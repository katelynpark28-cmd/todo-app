<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap">
    <style>
        /* ===== GLOBAL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
        }

        body {
            background-color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== MENU SCREEN ===== */
        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .menu-screen h1 {
            color: #4a4340;
            font-size: 32px;
            margin-bottom: 30px;
        }

        .menu-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            width: 100%;
        }

        .menu-btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
            border: 2px solid #ddd5c8;
            border-radius: 12px;
            background-color: #fffdf8;
            color: #4a4340;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .menu-btn:hover {
            background-color: #faf6ef;
        }

        .menu-btn.primary {
            background-color: #e8943a;
            color: white;
            border-color: #e8943a;
        }

        .menu-btn.primary:hover {
            background-color: #d4832e;
        }

        /* Saved list buttons */
        .saved-lists {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .saved-list-btn {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
            border: 2px solid #ddd5c8;
            border-radius: 12px;
            background-color: #fffdf8;
            color: #4a4340;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .saved-list-btn:hover {
            background-color: #faf6ef;
        }

        .saved-list-btn .list-title {
            font-weight: bold;
        }

        .saved-list-btn .list-code {
            font-size: 13px;
            color: #9a928a;
        }

        .premium-msg {
            color: #b0a89e;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        .premium-msg span {
            color: #e8943a;
        }

        /* Modal overlay for prompts */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal-box {
            background-color: #fffdf8;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .modal-box h2 {
            color: #4a4340;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
            border: 2px solid #ddd5c8;
            border-radius: 10px;
            background-color: #f5f0e8;
            color: #4a4340;
            outline: none;
            margin-bottom: 16px;
        }

        .modal-box input:focus {
            border-color: #e8943a;
        }

        .modal-box input::placeholder {
            color: #c0b8ae;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 10px 20px;
            font-size: 14px;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal-actions .cancel-btn {
            background-color: #ece6db;
            color: #7a7068;
        }

        .modal-actions .confirm-btn {
            background-color: #e8943a;
            color: white;
        }

        .modal-error {
            color: #c0392b;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        /* ===== TODO SCREEN ===== */
        .todo-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 120px 20px;
            width: 100%;
        }

        .todo-screen.visible {
            display: flex;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #7a7068;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
            z-index: 50;
        }

        .back-btn:hover {
            color: #4a4340;
        }

        /* List title (editable) */
        .list-title-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .list-title-display {
            font-size: 28px;
            color: #4a4340;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px dashed transparent;
        }

        .list-title-display:hover {
            border-bottom-color: #ddd5c8;
        }

        .list-code-display {
            font-size: 13px;
            color: #9a928a;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .list-code-display:hover {
            color: #7a7068;
        }

        .copied-msg {
            color: #e8943a;
            font-size: 12px;
            margin-left: 6px;
            display: none;
        }

        /* ===== DATE & TIME (top right) ===== */
        .datetime {
            position: fixed;
            top: 20px;
            right: 30px;
            text-align: right;
            color: #7a7068;
            font-size: 14px;
            z-index: 50;
        }

        .datetime .time {
            font-size: 28px;
            font-weight: bold;
            color: #4a4340;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            width: 100%;
            max-width: 550px;
            margin-top: 10px;
        }

        /* ===== TASK LIST ===== */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background-color: #fffdf8;
            border-radius: 10px;
            transition: all 0.2s ease;
            position: relative;
        }

        .task-item:hover {
            background-color: #faf6ef;
        }

        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #e8943a;
            flex-shrink: 0;
        }

        .task-item .task-text {
            flex: 1;
            font-size: 16px;
            color: #4a4340;
            word-break: break-word;
        }

        .task-item .task-text.done {
            color: #b0a89e;
        }

        .task-item .task-text.done .strikethrough {
            position: relative;
        }

        .task-item .task-text.done .strikethrough::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background-color: #b0a89e;
        }

        /* Delete button - hidden until hover */
        .task-item .delete-btn {
            display: none;
            background: none;
            border: none;
            font-size: 18px;
            color: #c9847a;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .task-item .delete-btn:hover {
            background-color: #f0d0cc;
            color: #a14a3e;
        }

        .task-item:hover .delete-btn {
            display: block;
        }

        /* ===== ADD TASK AREA ===== */
        .add-task-btn {
            position: fixed;
            right: 30px;
            top: 0;
            bottom: 0;
            margin: auto;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background-color: #e8943a;
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .add-task-btn:hover {
            background-color: #d4832e;
        }

        /* Input field that appears when you click + */
        .add-task-input-area {
            display: none;
            margin-top: 16px;
            gap: 8px;
            align-items: center;
        }

        .add-task-input-area.visible {
            display: flex;
        }

        .add-task-input-area input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            font-family: 'Comic Sans MS', 'Comic Neue', 'Comic Sans', cursive;
            border: 2px solid #ddd5c8;
            border-radius: 10px;
            background-color: #fffdf8;
            color: #4a4340;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .add-task-input-area input:focus {
            border-color: #e8943a;
        }

        .add-task-input-area input::placeholder {
            color: #c0b8ae;
        }

        /* ===== BOTTOM BAR (task counter + remarks) ===== */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #ece6db;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            min-height: 60px;
        }

        .task-counter {
            font-size: 14px;
            color: #7a7068;
            background-color: #fffdf8;
            padding: 6px 14px;
            border-radius: 8px;
        }

        /* ===== REMARK POPUP ===== */
        .remark-popup {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 14px;
            background-color: #fffdf8;
            padding: 14px 22px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            animation: popIn 0.3s ease;
            z-index: 100;
        }

        .remark-popup.visible {
            display: flex;
        }

        .remark-popup img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        .remark-popup .remark-text {
            font-size: 15px;
            color: #4a4340;
            max-width: 280px;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            color: #b0a89e;
            font-size: 16px;
            margin-top: 60px;
        }

        /* ===== PROFILE PHOTO (left side) ===== */
        .profile-area {
            position: fixed;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-photo-wrapper {
            position: relative;
            height: 50vh;
        }

        .profile-photo {
            height: 50vh;
            width: auto;
            object-fit: contain;
            transition: transform 0.1s ease;
        }

        .profile-photo.shake {
            animation: shakeIt 0.4s ease 3;
        }

        @keyframes shakeIt {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            50% { transform: rotate(-6deg); }
            75% { transform: rotate(4deg); }
            100% { transform: rotate(0deg); }
        }

        /* ===== CONFETTI ===== */
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            opacity: 1;
            pointer-events: none;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.3);
            }
        }

        /* ===== LOADING SPINNER ===== */
        .loading {
            color: #b0a89e;
            font-size: 16px;
            text-align: center;
            margin-top: 40px;
        }

        /* ===== MOBILE STYLES ===== */
        @media (max-width: 768px) {
            .todo-screen {
                padding: 20px 16px 120px 16px;
            }

            .datetime {
                position: static;
                text-align: center;
                margin-bottom: 16px;
            }

            .datetime .time {
                font-size: 20px;
            }

            .list-title-display {
                font-size: 22px;
            }

            .profile-area {
                position: static;
                transform: none;
                margin-bottom: 20px;
            }

            .profile-photo-wrapper {
                height: auto;
            }

            .profile-photo {
                height: auto;
                width: 120px;
                border-radius: 12px;
            }

            .add-task-btn {
                position: fixed;
                right: 16px;
                bottom: 75px;
                top: auto;
                margin: 0;
            }

            .container {
                margin-top: 10px;
                max-width: 100%;
            }

            .back-btn {
                position: static;
                margin-bottom: 10px;
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== MENU SCREEN ==================== -->
    <div class="menu-screen" id="menuScreen">
        <h1>To-Do List</h1>

        <div class="menu-buttons">
            <button class="menu-btn primary" id="newListBtn">+ New List</button>
            <button class="menu-btn" id="joinListBtn">Join List</button>
        </div>

        <div class="saved-lists" id="savedLists">
            <!-- Saved list buttons go here -->
        </div>
    </div>

    <!-- New List Modal -->
    <div class="modal-overlay" id="newListModal">
        <div class="modal-box">
            <h2>What do you want to title your list?</h2>
            <input type="text" id="newListTitle" placeholder="e.g. Katelyn's Chores" maxlength="40" />
            <div class="modal-error" id="newListError"></div>
            <div class="modal-actions">
                <button class="cancel-btn" id="newListCancel">Cancel</button>
                <button class="confirm-btn" id="newListConfirm">Create</button>
            </div>
        </div>
    </div>

    <!-- Join List Modal -->
    <div class="modal-overlay" id="joinListModal">
        <div class="modal-box">
            <h2>Enter the list code</h2>
            <input type="text" id="joinListCode" placeholder="8-character code" maxlength="8" />
            <div class="modal-error" id="joinListError"></div>
            <div class="modal-actions">
                <button class="cancel-btn" id="joinListCancel">Cancel</button>
                <button class="confirm-btn" id="joinListConfirm">Join</button>
            </div>
        </div>
    </div>

    <!-- Rename List Modal -->
    <div class="modal-overlay" id="renameListModal">
        <div class="modal-box">
            <h2>Rename your list</h2>
            <input type="text" id="renameListTitle" placeholder="New title" maxlength="40" />
            <div class="modal-actions">
                <button class="cancel-btn" id="renameListCancel">Cancel</button>
                <button class="confirm-btn" id="renameListConfirm">Save</button>
            </div>
        </div>
    </div>

    <!-- ==================== TODO SCREEN ==================== -->
    <div class="todo-screen" id="todoScreen">

        <!-- Back button -->
        <button class="back-btn" id="backBtn">← Back</button>

        <!-- PROFILE PHOTO (left side) -->
        <div class="profile-area">
            <div class="profile-photo-wrapper" id="profileWrapper">
                <img class="profile-photo" id="profilePhoto" src="images/me.png" alt="Me" />
            </div>
        </div>

        <!-- DATE & TIME -->
        <div class="datetime">
            <div class="time" id="timeDisplay"></div>
            <div id="dateDisplay"></div>
        </div>

        <!-- List title + code -->
        <div class="list-title-header">
            <span class="list-title-display" id="listTitleDisplay" title="Click to rename"></span>
        </div>
        <div class="list-code-display" id="listCodeDisplay" title="Click to copy code">
            Code: <span id="listCodeText"></span>
            <span class="copied-msg" id="copiedMsg">Copied!</span>
        </div>

        <!-- MAIN CONTENT -->
        <div class="container">
            <ul class="task-list" id="taskList"></ul>

            <div class="empty-state" id="emptyState">
                No tasks yet! Hit the + button to add one.
            </div>

            <div class="loading" id="loadingState" style="display:none;">
                Loading tasks...
            </div>

            <div class="add-task-input-area" id="addTaskArea">
                <input type="text" id="taskInput" placeholder="What do you need to do?" />
            </div>
        </div>

        <!-- + BUTTON -->
        <button class="add-task-btn" id="addBtn" style="font-family: Arial, sans-serif;">+</button>

        <!-- REMARK POPUP -->
        <div class="remark-popup" id="remarkPopup">
            <img id="remarkImg" src="" alt="" />
            <div class="remark-text" id="remarkText"></div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bottom-bar">
            <div class="task-counter" id="taskCounter">0 / 0 tasks finished</div>
        </div>
    </div>

    <!-- ==================== FIREBASE ==================== -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // ===== FIREBASE CONFIG =====
        var firebaseConfig = {
            apiKey: "AIzaSyBQnPufsqODHB9oigEidv_Q684akkI6jP4",
            authDomain: "todo-app-1e82b.firebaseapp.com",
            projectId: "todo-app-1e82b",
            storageBucket: "todo-app-1e82b.firebasestorage.app",
            messagingSenderId: "354871341876",
            appId: "1:354871341876:web:285e3e1df7db37b6f1eb61"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        // ===== IMAGES =====
        var narutoImg = 'images/naruto.jpg';
        var itachiImg = 'images/itachi.jpg';

        // ===== REMARKS =====
        var congratsRemarks = [
            "Believe it! You finished that task, dattebayo!",
            "That's the spirit! One step closer to Hokage!",
            "You did it! Naruto is proud of you!",
            "Way to go! Never give up, that's your ninja way!",
            "Amazing work! You're stronger than you think!",
            "Mission complete! Ichiraku ramen time!",
            "You crushed it! That's the Will of Fire!",
            "Awesome job! Even Kakashi-sensei would be impressed!",
            "Task defeated! You're on your way to becoming Hokage!",
            "Nice one! Your ninja way is unstoppable!"
        ];

        var encourageRemarks = [
            "Those who abandon their tasks are worse than scum.",
            "You have the power to change your fate.",
            "Keep going. Every ninja has tasks to complete.",
            "Don't give up. That is the true measure of a shinobi.",
            "You are not alone in this. Keep pushing forward.",
            "People's lives don't end when they fail. They end when they lose the will to try.",
            "Even the strongest shinobi must do their to-do list.",
            "Knowledge and awareness are vague, and perhaps better called illusions. But you can finish this.",
            "Those who can't acknowledge their own tasks will fail. Keep going.",
            "You are already stronger than you think. Now finish that task."
        ];

        // ===== STATE =====
        var currentListCode = null;
        var currentTasks = [];
        var unsubscribe = null; // For real-time listener
        var remarkTimeout = null;
        var confettiTimeout = null;

        // Saved lists stored in localStorage (which lists this device has access to)
        function getSavedLists() {
            return JSON.parse(localStorage.getItem('savedLists')) || [];
        }

        function saveSavedLists(lists) {
            localStorage.setItem('savedLists', JSON.stringify(lists));
        }

        function addToSavedLists(code, title) {
            var lists = getSavedLists();
            // Check if already saved
            var exists = false;
            for (var i = 0; i < lists.length; i++) {
                if (lists[i].code === code) {
                    lists[i].title = title;
                    exists = true;
                    break;
                }
            }
            if (!exists) {
                lists.push({ code: code, title: title });
            }
            saveSavedLists(lists);
        }

        // ===== GENERATE 8-CHAR CODE =====
        function generateCode() {
            var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            var code = '';
            for (var i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // ===== DOM ELEMENTS =====
        var menuScreen = document.getElementById('menuScreen');
        var todoScreen = document.getElementById('todoScreen');
        var savedListsDiv = document.getElementById('savedLists');

        var newListBtn = document.getElementById('newListBtn');
        var joinListBtn = document.getElementById('joinListBtn');

        var newListModal = document.getElementById('newListModal');
        var newListTitle = document.getElementById('newListTitle');
        var newListError = document.getElementById('newListError');
        var newListCancel = document.getElementById('newListCancel');
        var newListConfirm = document.getElementById('newListConfirm');

        var joinListModal = document.getElementById('joinListModal');
        var joinListCode = document.getElementById('joinListCode');
        var joinListError = document.getElementById('joinListError');
        var joinListCancel = document.getElementById('joinListCancel');
        var joinListConfirm = document.getElementById('joinListConfirm');

        var renameListModal = document.getElementById('renameListModal');
        var renameListTitleInput = document.getElementById('renameListTitle');
        var renameListCancel = document.getElementById('renameListCancel');
        var renameListConfirm = document.getElementById('renameListConfirm');

        var backBtn = document.getElementById('backBtn');
        var listTitleDisplay = document.getElementById('listTitleDisplay');
        var listCodeText = document.getElementById('listCodeText');
        var listCodeDisplay = document.getElementById('listCodeDisplay');
        var copiedMsg = document.getElementById('copiedMsg');

        var taskList = document.getElementById('taskList');
        var taskInput = document.getElementById('taskInput');
        var addBtn = document.getElementById('addBtn');
        var addTaskArea = document.getElementById('addTaskArea');
        var taskCounter = document.getElementById('taskCounter');
        var emptyState = document.getElementById('emptyState');
        var loadingState = document.getElementById('loadingState');
        var remarkPopup = document.getElementById('remarkPopup');
        var remarkImg = document.getElementById('remarkImg');
        var remarkText = document.getElementById('remarkText');

        // ===== RENDER MENU =====
        function renderMenu() {
            var lists = getSavedLists();
            savedListsDiv.innerHTML = '';

            if (lists.length > 0) {
                var label = document.createElement('div');
                label.style.color = '#9a928a';
                label.style.fontSize = '13px';
                label.style.marginBottom = '6px';
                label.textContent = 'Your lists';
                savedListsDiv.appendChild(label);
            }

            for (var i = 0; i < lists.length; i++) {
                (function(list) {
                    var btn = document.createElement('button');
                    btn.className = 'saved-list-btn';

                    var titleSpan = document.createElement('span');
                    titleSpan.className = 'list-title';
                    titleSpan.textContent = list.title || 'Untitled List';

                    var codeSpan = document.createElement('span');
                    codeSpan.className = 'list-code';
                    codeSpan.textContent = list.code;

                    btn.appendChild(titleSpan);
                    btn.appendChild(codeSpan);

                    btn.addEventListener('click', function() {
                        openList(list.code);
                    });

                    savedListsDiv.appendChild(btn);
                })(lists[i]);
            }

            // Premium message if at max
            if (lists.length >= 5) {
                newListBtn.disabled = true;
                newListBtn.style.opacity = '0.5';
                newListBtn.style.cursor = 'default';
                var msg = document.createElement('div');
                msg.className = 'premium-msg';
                msg.innerHTML = 'Max 5 lists reached. <span>Get Premium ✨</span> for unlimited lists!';
                savedListsDiv.appendChild(msg);
            } else {
                newListBtn.disabled = false;
                newListBtn.style.opacity = '1';
                newListBtn.style.cursor = 'pointer';
            }
        }

        // ===== SHOW/HIDE SCREENS =====
        function showMenu() {
            // Stop listening to the current list
            if (unsubscribe) {
                unsubscribe();
                unsubscribe = null;
            }
            currentListCode = null;
            currentTasks = [];
            todoScreen.classList.remove('visible');
            menuScreen.style.display = 'flex';
            renderMenu();
        }

        function showTodo() {
            menuScreen.style.display = 'none';
            todoScreen.classList.add('visible');
        }

        // ===== CREATE NEW LIST =====
        function createNewList(title) {
            var code = generateCode();
            var listData = {
                title: title || 'Untitled List',
                code: code,
                tasks: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection('lists').doc(code).set(listData).then(function() {
                addToSavedLists(code, listData.title);
                openList(code);
            }).catch(function(error) {
                alert('Error creating list: ' + error.message);
            });
        }

        // ===== OPEN A LIST =====
        function openList(code) {
            currentListCode = code;
            loadingState.style.display = 'block';
            emptyState.style.display = 'none';
            taskList.innerHTML = '';
            showTodo();

            // Stop any previous listener
            if (unsubscribe) {
                unsubscribe();
            }

            // Listen to the list in real-time
            unsubscribe = db.collection('lists').doc(code).onSnapshot(function(doc) {
                loadingState.style.display = 'none';

                if (!doc.exists) {
                    alert('List not found! Check the code and try again.');
                    showMenu();
                    return;
                }

                var data = doc.data();
                currentTasks = data.tasks || [];
                listTitleDisplay.textContent = data.title || 'Untitled List';
                listCodeText.textContent = code;

                // Update saved lists with latest title
                addToSavedLists(code, data.title);

                renderTasks();
            }, function(error) {
                loadingState.style.display = 'none';
                alert('Error loading list: ' + error.message);
                showMenu();
            });
        }

        // ===== JOIN A LIST =====
        function joinList(code) {
            db.collection('lists').doc(code).get().then(function(doc) {
                if (!doc.exists) {
                    joinListError.textContent = 'No list found with that code!';
                    joinListError.style.display = 'block';
                    return;
                }
                var data = doc.data();
                addToSavedLists(code, data.title);
                joinListModal.classList.remove('visible');
                joinListCode.value = '';
                joinListError.style.display = 'none';
                openList(code);
            }).catch(function(error) {
                joinListError.textContent = 'Error: ' + error.message;
                joinListError.style.display = 'block';
            });
        }

        // ===== RENDER TASKS =====
        function renderTasks() {
            taskList.innerHTML = '';

            if (currentTasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
            }

            currentTasks.forEach(function(task, index) {
                var li = document.createElement('li');
                li.className = 'task-item';

                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = task.done;
                checkbox.addEventListener('change', function() {
                    toggleTask(index);
                });

                var text = document.createElement('span');
                text.className = 'task-text' + (task.done ? ' done' : '');
                text.style.cursor = 'pointer';
                text.addEventListener('click', function() {
                    toggleTask(index);
                });
                if (task.done) {
                    var inner = document.createElement('span');
                    inner.className = 'strikethrough';
                    inner.textContent = task.name;
                    text.appendChild(inner);
                } else {
                    text.textContent = task.name;
                }

                var deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '✕';
                deleteBtn.addEventListener('click', function() {
                    deleteTask(index);
                });

                li.appendChild(checkbox);
                li.appendChild(text);
                li.appendChild(deleteBtn);
                taskList.appendChild(li);
            });

            updateCounter();
        }

        // ===== SAVE TASKS TO FIREBASE =====
        function saveTasksToFirebase() {
            if (!currentListCode) return;
            db.collection('lists').doc(currentListCode).update({
                tasks: currentTasks
            });
        }

        // ===== ADD TASK =====
        function addTask(name) {
            if (name.trim() === '') return;
            currentTasks.push({ name: name.trim(), done: false });
            saveTasksToFirebase();
            taskInput.value = '';
        }

        // ===== DELETE TASK =====
        function deleteTask(index) {
            currentTasks.splice(index, 1);
            saveTasksToFirebase();
        }

        // ===== TOGGLE TASK =====
        function toggleTask(index) {
            var wasDone = currentTasks[index].done;
            currentTasks[index].done = !currentTasks[index].done;
            saveTasksToFirebase();

            if (currentTasks[index].done) {
                showRemark('congrats');
                triggerCelebration();
            } else {
                showRemark('encourage');
            }
        }

        // ===== UPDATE COUNTER =====
        function updateCounter() {
            var total = currentTasks.length;
            var done = currentTasks.filter(function(t) { return t.done; }).length;
            taskCounter.textContent = done + ' / ' + total + ' tasks finished';
        }

        // ===== SHOW REMARK =====
        function showRemark(type) {
            if (remarkTimeout) {
                clearTimeout(remarkTimeout);
            }

            if (type === 'congrats') {
                var msg = congratsRemarks[Math.floor(Math.random() * congratsRemarks.length)];
                remarkImg.src = narutoImg;
                remarkImg.alt = 'Naruto';
                remarkText.textContent = msg;
            } else {
                var msg = encourageRemarks[Math.floor(Math.random() * encourageRemarks.length)];
                remarkImg.src = itachiImg;
                remarkImg.alt = 'Itachi';
                remarkText.textContent = msg;
            }

            remarkPopup.classList.add('visible');

            remarkTimeout = setTimeout(function() {
                remarkPopup.classList.remove('visible');
            }, 5000);
        }

        // ===== CELEBRATION (confetti + shake) =====
        function triggerCelebration() {
            var photo = document.getElementById('profilePhoto');
            var wrapper = document.getElementById('profileWrapper');

            photo.classList.remove('shake');
            setTimeout(function() { photo.classList.add('shake'); }, 10);

            if (confettiTimeout) clearTimeout(confettiTimeout);

            var colors = ['#1b2a4a', '#1a2744', '#2c3e6b', '#c0392b', '#e74c3c', '#d44035'];
            for (var i = 0; i < 30; i++) {
                var piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                var size = 6 + Math.random() * 6;
                piece.style.width = size + 'px';
                piece.style.height = (Math.random() > 0.5 ? size : size * 0.5) + 'px';
                piece.style.borderRadius = (Math.random() > 0.5 ? '2px' : '0');
                piece.style.left = '50%';
                piece.style.top = '50%';

                var angle = Math.random() * Math.PI * 2;
                var distance = 80 + Math.random() * 120;
                var xEnd = Math.cos(angle) * distance;
                var yEnd = Math.sin(angle) * distance;
                var rotation = (Math.random() - 0.5) * 720;

                piece.style.setProperty('--x', xEnd + 'px');
                piece.style.setProperty('--y', yEnd + 'px');
                piece.style.setProperty('--r', rotation + 'deg');

                var duration = 0.8 + Math.random() * 0.6;
                piece.style.animation = 'confettiFall ' + duration + 's ease-out forwards';
                piece.style.animationDelay = (Math.random() * 0.2) + 's';

                wrapper.appendChild(piece);
            }

            confettiTimeout = setTimeout(function() {
                var pieces = wrapper.querySelectorAll('.confetti-piece');
                pieces.forEach(function(p) { p.remove(); });
                photo.classList.remove('shake');
            }, 5000);
        }

        // ===== DATE & TIME =====
        function updateDateTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = String(now.getMinutes()).padStart(2, '0');
            var ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            if (hours === 0) hours = 12;
            document.getElementById('timeDisplay').textContent = hours + ':' + minutes + ' ' + ampm;

            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', options);
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ===== EVENT LISTENERS =====

        // New List button
        newListBtn.addEventListener('click', function() {
            if (newListBtn.disabled) return;
            newListModal.classList.add('visible');
            newListTitle.value = '';
            newListError.style.display = 'none';
            newListTitle.focus();
        });

        newListCancel.addEventListener('click', function() {
            newListModal.classList.remove('visible');
        });

        newListConfirm.addEventListener('click', function() {
            var title = newListTitle.value.trim();
            if (!title) {
                newListError.textContent = 'Please enter a title!';
                newListError.style.display = 'block';
                return;
            }
            newListModal.classList.remove('visible');
            createNewList(title);
        });

        newListTitle.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') newListConfirm.click();
        });

        // Join List button
        joinListBtn.addEventListener('click', function() {
            joinListModal.classList.add('visible');
            joinListCode.value = '';
            joinListError.style.display = 'none';
            joinListCode.focus();
        });

        joinListCancel.addEventListener('click', function() {
            joinListModal.classList.remove('visible');
        });

        joinListConfirm.addEventListener('click', function() {
            var code = joinListCode.value.trim();
            if (code.length !== 8) {
                joinListError.textContent = 'Code must be exactly 8 characters!';
                joinListError.style.display = 'block';
                return;
            }
            joinList(code);
        });

        joinListCode.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') joinListConfirm.click();
        });

        // Back button
        backBtn.addEventListener('click', function() {
            showMenu();
        });

        // + button toggles the input field
        addBtn.addEventListener('click', function() {
            addTaskArea.classList.toggle('visible');
            if (addTaskArea.classList.contains('visible')) {
                taskInput.focus();
            }
        });

        // Press Enter to add task
        taskInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                addTask(taskInput.value);
            }
        });

        // Click list title to rename
        listTitleDisplay.addEventListener('click', function() {
            renameListTitleInput.value = listTitleDisplay.textContent;
            renameListModal.classList.add('visible');
            renameListTitleInput.focus();
        });

        renameListCancel.addEventListener('click', function() {
            renameListModal.classList.remove('visible');
        });

        renameListConfirm.addEventListener('click', function() {
            var newTitle = renameListTitleInput.value.trim();
            if (!newTitle) return;
            db.collection('lists').doc(currentListCode).update({ title: newTitle });
            renameListModal.classList.remove('visible');
        });

        renameListTitleInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') renameListConfirm.click();
        });

        // Click code to copy
        listCodeDisplay.addEventListener('click', function() {
            navigator.clipboard.writeText(currentListCode).then(function() {
                copiedMsg.style.display = 'inline';
                setTimeout(function() {
                    copiedMsg.style.display = 'none';
                }, 2000);
            });
        });

        // Close modals by clicking overlay
        document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    overlay.classList.remove('visible');
                }
            });
        });

        // ===== INITIALIZE =====
        renderMenu();
    </script>
</body>
</html>
