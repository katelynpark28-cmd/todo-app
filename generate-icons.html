<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
    <p>Right-click each image below and "Save image as..." to your <strong>todo-app/images/</strong> folder.</p>

    <h3>Save as: icon-192.png</h3>
    <canvas id="c192" width="192" height="192"></canvas>

    <h3>Save as: icon-512.png</h3>
    <canvas id="c512" width="512" height="512"></canvas>

    <script>
        function drawIcon(canvas) {
            var s = canvas.width;
            var ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#4a9e8e';
            ctx.beginPath();
            ctx.roundRect(0, 0, s, s, s * 0.2);
            ctx.fill();

            // Checkmark
            ctx.strokeStyle = 'white';
            ctx.lineWidth = s * 0.08;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(s * 0.25, s * 0.5);
            ctx.lineTo(s * 0.42, s * 0.68);
            ctx.lineTo(s * 0.75, s * 0.32);
            ctx.stroke();
        }

        drawIcon(document.getElementById('c192'));
        drawIcon(document.getElementById('c512'));

        // Auto-convert to images for easy saving
        ['c192', 'c512'].forEach(function(id) {
            var canvas = document.getElementById(id);
            var img = new Image();
            img.src = canvas.toDataURL('image/png');
            img.style.display = 'block';
            img.style.marginBottom = '20px';
            canvas.replaceWith(img);
        });
    </script>
</body>
</html>
